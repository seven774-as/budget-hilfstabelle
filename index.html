<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Budget Hilfstabelle</title>
  <style>
    :root {
      --green:  #00b050;
      --yellow: #ffc000;
      --orange: #ff6600;
      --red:    #c00000;
      --bg:     #1a1a2e;
      --card:   #16213e;
      --border: #0f3460;
      --text:   #e0e0e0;
      --muted:  #8892a4;
      --input-bg: #0f3460;
      --accent: #e94560;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 24px 16px;
    }

    h1 {
      text-align: center;
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
      color: #fff;
    }

    .subtitle {
      text-align: center;
      color: var(--muted);
      font-size: 0.85rem;
      margin-bottom: 24px;
    }

    /* Day selector */
    .day-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 28px;
    }

    .day-row label {
      font-weight: 600;
      font-size: 1rem;
    }

    .day-row input[type=number] {
      width: 70px;
      padding: 8px 12px;
      border-radius: 8px;
      border: 2px solid var(--yellow);
      background: var(--input-bg);
      color: var(--yellow);
      font-size: 1.2rem;
      font-weight: 700;
      text-align: center;
      outline: none;
    }

    .day-row input[type=number]:focus {
      border-color: #fff;
    }

    /* Grid of budget blocks */
    .blocks {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
      margin-bottom: 28px;
    }

    .block {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .block-header {
      font-size: 1.1rem;
      font-weight: 700;
      text-align: center;
      margin-bottom: 16px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
      letter-spacing: 0.06em;
      color: #fff;
    }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 7px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      font-size: 0.9rem;
    }

    .row:last-child { border-bottom: none; }

    .row .label { color: var(--muted); }

    .row .value {
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }

    /* editable inputs inside rows */
    .row input[type=number] {
      width: 110px;
      padding: 4px 10px;
      border-radius: 6px;
      border: 2px solid var(--green);
      background: rgba(0,176,80,0.12);
      color: var(--green);
      font-size: 0.95rem;
      font-weight: 700;
      text-align: right;
      outline: none;
    }

    .row input[type=number]:focus {
      border-color: #fff;
      background: rgba(255,255,255,0.08);
      color: #fff;
    }

    .row.budget-row input[type=number] {
      border-color: #4a9eff;
      background: rgba(74,158,255,0.12);
      color: #4a9eff;
    }

    /* deviation coloring */
    .positive { color: var(--green); }
    .negative { color: var(--red); }
    .neutral  { color: var(--text); }

    /* traffic light badge */
    .ampel {
      margin-top: 16px;
      padding: 10px 14px;
      border-radius: 10px;
      font-weight: 700;
      font-size: 0.9rem;
      text-align: center;
      letter-spacing: 0.03em;
    }

    .ampel.gruen  { background: rgba(0,176,80,0.2);  color: var(--green);  border: 1px solid var(--green); }
    .ampel.gelb   { background: rgba(255,192,0,0.2); color: var(--yellow); border: 1px solid var(--yellow); }
    .ampel.orange { background: rgba(255,102,0,0.2); color: var(--orange); border: 1px solid var(--orange); }
    .ampel.rot    { background: rgba(192,0,0,0.2);   color: var(--red);    border: 1px solid var(--red); }

    /* Calculator */
    .calc-section {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px;
      margin-bottom: 28px;
    }

    .calc-section h2 {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 14px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
      color: #fff;
    }

    .calc-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.88rem;
    }

    .calc-table th {
      text-align: left;
      color: var(--muted);
      padding: 6px 4px;
      font-weight: 600;
      border-bottom: 1px solid var(--border);
    }

    .calc-table th:first-child { width: 130px; }

    .calc-table td {
      padding: 5px 4px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      vertical-align: middle;
    }

    .calc-table input[type=number] {
      width: 120px;
      padding: 5px 8px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--input-bg);
      color: var(--text);
      font-size: 0.88rem;
      text-align: right;
      outline: none;
    }

    .calc-table input[type=text] {
      width: 100%;
      padding: 5px 8px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--input-bg);
      color: var(--text);
      font-size: 0.88rem;
      outline: none;
    }

    .calc-table input:focus {
      border-color: #4a9eff;
    }

    .calc-sum-row td {
      font-weight: 700;
      color: #fff;
      border-top: 2px solid var(--border);
      padding-top: 10px;
    }

    .calc-sum-amount {
      font-size: 1.05rem;
      font-variant-numeric: tabular-nums;
    }

    .btn-add {
      margin-top: 12px;
      padding: 7px 16px;
      border-radius: 7px;
      border: 1px solid var(--border);
      background: var(--input-bg);
      color: var(--muted);
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.15s;
    }

    .btn-add:hover {
      border-color: #4a9eff;
      color: #4a9eff;
    }

    /* Footer link */
    .footer {
      text-align: center;
      margin-top: 8px;
    }

    .footer a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.85rem;
      border-bottom: 1px dashed var(--border);
      padding-bottom: 2px;
      transition: color 0.15s;
    }

    .footer a:hover { color: #fff; }

    /* Keep export button */
    .keep-bar {
      display: flex;
      justify-content: center;
      margin-bottom: 20px;
    }

    .btn-keep {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 24px;
      border-radius: 10px;
      border: 2px solid #fbbc04;
      background: rgba(251,188,4,0.10);
      color: #fbbc04;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.03em;
      transition: all 0.15s;
    }

    .btn-keep:hover {
      background: rgba(251,188,4,0.20);
      border-color: #fff;
      color: #fff;
    }

    .btn-keep svg { flex-shrink: 0; }

    /* Toast */
    #toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #1e3a1e;
      border: 1px solid var(--green);
      color: var(--green);
      padding: 12px 22px;
      border-radius: 10px;
      font-size: 0.88rem;
      font-weight: 600;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s, transform 0.25s;
      white-space: nowrap;
      z-index: 999;
    }

    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 600px) {
      .blocks { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<h1>Budget Hilfstabelle</h1>
<p class="subtitle">Monatliche Budgetkontrolle — Karin · Haushalt · Andreas</p>

<!-- Shared day input -->
<div class="day-row">
  <label for="tag">Aktueller Tag:</label>
  <input type="number" id="tag" min="1" max="31" value="1">
  <span style="color:var(--muted); font-size:0.85rem;">/ 30</span>
</div>

<!-- Budget blocks -->
<div class="blocks" id="blocks-container">
  <!-- Rendered by JS -->
</div>

<!-- Calculator -->
<div class="calc-section">
  <h2>🧮 Calculator</h2>
  <table class="calc-table">
    <thead>
      <tr>
        <th>Betrag (€)</th>
        <th>Beschreibung</th>
      </tr>
    </thead>
    <tbody id="calc-body">
      <!-- Rows rendered by JS -->
    </tbody>
    <tfoot>
      <tr class="calc-sum-row">
        <td>
          <span style="color:var(--muted); font-size:0.82rem;">Summe&nbsp;</span>
          <span class="calc-sum-amount" id="calc-sum">0,00 €</span>
        </td>
        <td></td>
      </tr>
    </tfoot>
  </table>
  <button class="btn-add" onclick="addCalcRow()">+ Zeile hinzufügen</button>
</div>

<!-- Keep export -->
<div class="keep-bar">
  <button class="btn-keep" onclick="exportToKeep()">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/>
    </svg>
    In Google Keep speichern
  </button>
</div>

<!-- Google Keep link -->
<div class="footer">
  <a href="https://keep.google.com/u/0/#NOTE/15_HA9THm6h-YnCq8JdeXJPoeaGDakymWWF3dHY15vJTxDd4kHdlpZlvn2nsFLA" target="_blank" rel="noopener">
    📝 Google Keep öffnen
  </a>
</div>

<div id="toast"></div>

<script>
// ─── State ──────────────────────────────────────────────────────────────────

const DEFAULT_STATE = {
  tag: 21,
  budgets: [
    { name: 'Karin',    budget: 750, ist: 152 },
    { name: 'Haushalt', budget: 850, ist: 152 },
    { name: 'Andreas',  budget: 750, ist: 167 },
  ],
  calcRows: [
    { betrag: '', beschreibung: 'Inliner' },
    { betrag: -26, beschreibung: 'Trailmaker add inn' },
    { betrag: '', beschreibung: '' },
    { betrag: '', beschreibung: '' },
    { betrag: '', beschreibung: '' },
  ],
};

function loadState() {
  try {
    const raw = localStorage.getItem('budget_state');
    if (raw) return JSON.parse(raw);
  } catch (e) {}
  return JSON.parse(JSON.stringify(DEFAULT_STATE));
}

function saveState() {
  localStorage.setItem('budget_state', JSON.stringify(state));
}

const state = loadState();

// ─── Calculations ────────────────────────────────────────────────────────────

function calcBlock(budget, ist, tag) {
  const proTag   = budget / 30;
  const soll     = Math.abs(proTag * tag - budget);   // remaining budget target
  const abw      = ist - soll;                         // deviation (negative = overspent)
  const buchung  = budget - ist;                       // remaining actual
  return { proTag, soll, abw, buchung };
}

function ampelClass(ist, soll) {
  if (ist < soll * 0.70) return 'rot';
  if (ist < soll * 0.85) return 'orange';
  if (ist < soll)        return 'gelb';
  return 'gruen';
}

function ampelText(ist, soll) {
  const cls = ampelClass(ist, soll);
  if (cls === 'gruen') return '🟢 Grün — im Budget';
  const pct = Math.round(Math.abs(soll - ist) / soll * 100);
  const icons = { gelb: '🟡', orange: '🟠', rot: '🔴' };
  const labels = { gelb: 'Gelb', orange: 'Orange', rot: 'Rot' };
  return `${icons[cls]} ${labels[cls]} — ${pct}% unter Budget`;
}

// ─── Formatting ──────────────────────────────────────────────────────────────

function fmt(n) {
  return n.toLocaleString('de-DE', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' €';
}

// ─── Render budget blocks ────────────────────────────────────────────────────

function renderBlocks() {
  const tag = state.tag;
  const container = document.getElementById('blocks-container');
  container.innerHTML = '';

  state.budgets.forEach((b, i) => {
    const { proTag, soll, abw, buchung } = calcBlock(b.budget, b.ist, tag);
    const cls = ampelClass(b.ist, soll);
    const txt = ampelText(b.ist, soll);
    const abwColor = abw >= 0 ? 'positive' : 'negative';

    const div = document.createElement('div');
    div.className = 'block';
    div.innerHTML = `
      <div class="block-header">${b.name}</div>

      <div class="row budget-row">
        <span class="label">Budget</span>
        <input type="number" data-block="${i}" data-field="budget"
               value="${b.budget}" min="0" step="10">
      </div>

      <div class="row">
        <span class="label">Aktueller Tag</span>
        <span class="value neutral">${tag}</span>
      </div>

      <div class="row">
        <span class="label">IST Stand</span>
        <input type="number" data-block="${i}" data-field="ist"
               value="${b.ist}" min="0" step="1">
      </div>

      <div class="row">
        <span class="label">SOLL Stand</span>
        <span class="value neutral">${fmt(soll)}</span>
      </div>

      <div class="row">
        <span class="label">Abweichung</span>
        <span class="value ${abwColor}">${fmt(abw)}</span>
      </div>


      <div class="row">
        <span class="label">Pro Tag</span>
        <span class="value neutral">${fmt(proTag)}</span>
      </div>

      <div class="ampel ${cls}">${txt}</div>
    `;
    container.appendChild(div);
  });

  // Attach listeners
  container.querySelectorAll('input[data-block]').forEach(inp => {
    inp.addEventListener('change', e => {
      const idx   = +e.target.dataset.block;
      const field = e.target.dataset.field;
      state.budgets[idx][field] = parseFloat(e.target.value) || 0;
      saveState();
      renderBlocks();
      updateCalcSum(); // re-sync if Andreas IST changed
    });
  });
}

// ─── Render calculator ───────────────────────────────────────────────────────

function renderCalc() {
  const tbody = document.getElementById('calc-body');
  tbody.innerHTML = '';

  state.calcRows.forEach((row, i) => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>
        <input type="number" data-calc="${i}" data-field="betrag"
               value="${row.betrag}" step="0.01" placeholder="0,00">
      </td>
      <td>
        <input type="text" data-calc="${i}" data-field="beschreibung"
               value="${row.beschreibung}" placeholder="Beschreibung">
      </td>
    `;
    tbody.appendChild(tr);
  });

  tbody.querySelectorAll('input').forEach(inp => {
    inp.addEventListener('input', e => {
      const idx   = +e.target.dataset.calc;
      const field = e.target.dataset.field;
      state.calcRows[idx][field] = field === 'betrag'
        ? (e.target.value === '' ? '' : parseFloat(e.target.value))
        : e.target.value;
      saveState();
      updateCalcSum();
    });
  });

  updateCalcSum();
}

function updateCalcSum() {
  const sum = state.calcRows.reduce((acc, r) => {
    return acc + (typeof r.betrag === 'number' ? r.betrag : 0);
  }, 0);
  document.getElementById('calc-sum').textContent = fmt(sum);
}

function addCalcRow() {
  state.calcRows.push({ betrag: '', beschreibung: '' });
  saveState();
  renderCalc();
}

// ─── Day input ───────────────────────────────────────────────────────────────

const tagInput = document.getElementById('tag');
tagInput.value = state.tag;

tagInput.addEventListener('change', () => {
  let v = parseInt(tagInput.value, 10);
  if (isNaN(v) || v < 1) v = 1;
  if (v > 31) v = 31;
  tagInput.value = v;
  state.tag = v;
  saveState();
  renderBlocks();
});

// ─── Google Keep Export ──────────────────────────────────────────────────────

const KEEP_NOTE_URL = 'https://keep.google.com/u/0/#NOTE/15_HA9THm6h-YnCq8JdeXJPoeaGDakymWWF3dHY15vJTxDd4kHdlpZlvn2nsFLA';

function buildKeepText() {
  const now  = new Date();
  const date = now.toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit', year: 'numeric' });
  const time = now.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
  const tag  = state.tag;

  const lines = [];
  lines.push(`📊 Budget-Update — ${date} ${time} (Tag ${tag}/30)`);
  lines.push('─'.repeat(36));

  state.budgets.forEach(b => {
    const { soll, abw, buchung } = calcBlock(b.budget, b.ist, tag);
    const cls = ampelClass(b.ist, soll);
    const icon = { gruen: '🟢', gelb: '🟡', orange: '🟠', rot: '🔴' }[cls];
    lines.push('');
    lines.push(`${icon} ${b.name}`);
    lines.push(`  IST Stand:    ${fmt(b.ist)}`);
    lines.push(`  SOLL Stand:   ${fmt(soll)}`);
    lines.push(`  Abweichung:   ${fmt(abw)}`);
  });

  return lines.join('\n');
}

function showToast(msg, isError = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background    = isError ? '#3a1e1e' : '#1e3a1e';
  t.style.borderColor   = isError ? 'var(--red)' : 'var(--green)';
  t.style.color         = isError ? 'var(--red)' : 'var(--green)';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 4000);
}

async function exportToKeep() {
  const text = buildKeepText();
  try {
    await navigator.clipboard.writeText(text);
    window.open(KEEP_NOTE_URL, '_blank', 'noopener');
    showToast('✓ Ergebnisse kopiert — Notiz öffnet sich → Strg+V einfügen');
  } catch (e) {
    // Fallback: show text in a selectable prompt
    prompt('Kopiere diesen Text manuell (Strg+A → Strg+C):', text);
    window.open(KEEP_NOTE_URL, '_blank', 'noopener');
  }
}

// ─── Init ────────────────────────────────────────────────────────────────────

renderBlocks();
renderCalc();
</script>
</body>
</html>
